name: Main CI job
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build plugin OTP-${{ matrix.otp-version }} rebar-${{ matrix.rebar-version }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp-version: 24
            rebar-version: 3.22.1
          - otp-version: 25
            rebar-version: 3.27.0
          - otp-version: 26
            rebar-version: 3.27.0
          - otp-version: 27
            rebar-version: 3.27.0
          - otp-version: 28
            rebar-version: 3.27.0
          - otp-version: 28.5
            rebar-version: 3.27.0

    steps:
      - uses: actions/checkout@v6

      - name: Install Erlang OTP-${{ matrix.otp-version }}
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp-version }}
          rebar3-version: ${{ matrix.rebar-version }}

      - name: Compile plugin
        run: |
          rebar3 --version
          rebar3 compile

